<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Strateg2 — RTS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game">
    <canvas id="canvas" width="1152" height="640"></canvas>
    <div id="hud">
      <!-- Resource row + action menus are generated from config by client/hud-dom.js. -->
      <canvas id="minimap" width="240" height="160" style="display:none"></canvas>
      <div id="resources"></div>
      <div id="build-menu"></div>
      <div id="train-menu" style="display:none"></div>
      <div id="research-menu" style="display:none"></div>
      <div id="lobby-players-panel" style="display:none">
        <div class="lobby-section-title">Players online</div>
        <div id="lobby-self"></div>
        <label class="lobby-map-size">Map size:
          <select id="lobby-map-size"></select>
        </label>
        <ul id="lobby-players"></ul>
        <div id="lobby-status-msg"></div>
        <button id="lobby-play-vs-ai">Play vs AI</button>
        <button id="lobby-load-replay">Load replay</button>
      </div>
      <div id="options">
        <label>Red AI:
          <select id="red-ai">
            <option value="off">Off</option>
            <option value="att">Att AI</option>
            <option value="def">Def AI</option>
            <option value="adaptive">Adaptive AI</option>
            <option value="utility">Utility AI</option>
            <option value="hybrid">Hybrid AI</option>
          </select>
        </label>
        <label>Blue AI:
          <select id="blue-ai">
            <option value="off">Off</option>
            <option value="att">Att AI</option>
            <option value="def">Def AI</option>
            <option value="adaptive">Adaptive AI</option>
            <option value="utility">Utility AI</option>
            <option value="hybrid">Hybrid AI</option>
          </select>
        </label>
        <label><input type="checkbox" id="always-hit" checked /> Always-hit arrows</label>
        <label>Stacks:
          <select id="stack-mode">
            <option value="spread">Spread (slight shift)</option>
            <option value="badge">Badge (count + total HP)</option>
            <option value="overlap">Overlap (no separation)</option>
          </select>
        </label>
        <label>Supply:
          <select id="supply-priority">
            <option value="auto">Auto</option>
            <option value="wood">Wood first</option>
            <option value="arrows">Arrows first</option>
          </select>
        </label>
      </div>
      <div id="selection-info"></div>
      <button id="eject-button" style="display:none">Eject all</button>
      <div id="hint">Left-click: select / drag-box. Right-click: move / gather / attack / haul. Click a Town Hall to train peasants, Barracks for swordsmen, Archery Range for archers.</div>
    </div>
    <div id="toasts"></div>
    <div id="game-over" style="display:none">
      <div id="game-over-text"></div>
      <button id="download-replay">Download replay</button>
      <button id="restart">Restart</button>
    </div>
    <div id="replay-controls" style="display:none">
      <button id="replay-play">Pause</button>
      <button id="replay-speed-1" class="active">1x</button>
      <button id="replay-speed-2">2x</button>
      <button id="replay-speed-4">4x</button>
      <input id="replay-scrub" type="range" min="0" max="100" value="0" step="1" />
      <span id="replay-tick">0 / 0</span>
      <span id="replay-badge"></span>
      <button id="replay-exit">Exit</button>
    </div>
    <div id="start-game-modal" style="display:none">
      <div class="lobby-modal-title">New game</div>
      <label class="lobby-map-size">Map size:
        <select id="start-game-map-size"></select>
      </label>
      <label class="lobby-map-size">Your AI:
        <select id="start-game-red-ai"></select>
      </label>
      <label class="lobby-map-size">Opponent AI:
        <select id="start-game-blue-ai"></select>
      </label>
      <div class="lobby-modal-actions">
        <button id="start-game-submit">Start</button>
        <button id="start-game-load-replay">Load replay</button>
        <button id="start-game-auto-battles">Auto Battles</button>
      </div>
    </div>
    <div id="auto-battles-panel" style="display:none">
      <div class="lobby-modal-title">Auto Battles</div>
      <pre id="auto-battles-status">Starting…</pre>
      <button id="auto-battles-stop">Stop</button>
    </div>
    <div id="replay-browser-modal" style="display:none">
      <div class="lobby-modal-title">Load replay</div>
      <div id="replay-browser-status"></div>
      <div id="replay-browser-list"></div>
      <label class="replay-browser-file-label">From disk:
        <input id="replay-browser-file" type="file" accept="application/json,.json" />
      </label>
      <div class="lobby-modal-actions">
        <button id="replay-browser-cancel">Cancel</button>
      </div>
    </div>
    <div id="lobby-name-modal" style="display:none">
      <div class="lobby-modal-title">Enter your name</div>
      <input id="lobby-name-input" type="text" maxlength="24" placeholder="Your name" />
      <div id="lobby-name-error" class="lobby-modal-error"></div>
      <button id="lobby-name-submit">Join lobby</button>
    </div>
    <div id="lobby-invite-modal" style="display:none">
      <div id="lobby-invite-text" class="lobby-modal-title"></div>
      <div class="lobby-modal-actions">
        <button id="lobby-invite-accept">Accept</button>
        <button id="lobby-invite-decline">Decline</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
