<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Strateg2 — RTS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game">
    <canvas id="canvas" width="1152" height="640"></canvas>
    <div id="hud">
      <div id="resources">
        <span>Gold: <b id="gold">0</b></span>
        <span>Wood: <b id="wood">0</b></span>
        <span>Arrows: <b id="arrows-total">0</b></span>
        <span id="pop-info">Units: <b id="pop">0</b></span>
      </div>
      <div id="build-menu">
        <button data-build="barracks">Barracks (200g 100w)</button>
        <button data-build="archeryRange">Archery Range (200g 100w)</button>
        <button data-build="arrowBuilding">Arrow Building (100g 150w)</button>
        <button data-build="tower">Tower (150g 100w)</button>
        <button data-build="cancel">Cancel</button>
      </div>
      <div id="train-menu" style="display:none">
        <span id="train-title">Train:</span>
        <button data-train="peasant">Peasant (50g)</button>
        <button data-train="swordsman">Swordsman (80g)</button>
        <button data-train="archer">Archer (70g)</button>
      </div>
      <div id="lobby-players-panel" style="display:none">
        <div class="lobby-section-title">Players online</div>
        <div id="lobby-self"></div>
        <ul id="lobby-players"></ul>
        <div id="lobby-status-msg"></div>
      </div>
      <div id="options">
        <label>Red AI:
          <select id="red-ai">
            <option value="off">Off</option>
            <option value="att">Att AI</option>
            <option value="def">Def AI</option>
            <option value="adaptive">Adaptive AI</option>
            <option value="utility">Utility AI</option>
            <option value="hybrid">Hybrid AI</option>
          </select>
        </label>
        <label>Blue AI:
          <select id="blue-ai">
            <option value="off">Off</option>
            <option value="att">Att AI</option>
            <option value="def">Def AI</option>
            <option value="adaptive">Adaptive AI</option>
            <option value="utility">Utility AI</option>
            <option value="hybrid">Hybrid AI</option>
          </select>
        </label>
        <label><input type="checkbox" id="always-hit" checked /> Always-hit arrows</label>
        <label>Stacks:
          <select id="stack-mode">
            <option value="spread">Spread (slight shift)</option>
            <option value="badge">Badge (count + total HP)</option>
            <option value="overlap">Overlap (no separation)</option>
          </select>
        </label>
        <label>Supply:
          <select id="supply-priority">
            <option value="auto">Auto</option>
            <option value="wood">Wood first</option>
            <option value="arrows">Arrows first</option>
          </select>
        </label>
      </div>
      <div id="selection-info"></div>
      <button id="eject-button" style="display:none">Eject all</button>
      <div id="hint">Left-click: select / drag-box. Right-click: move / gather / attack / haul. Click a Town Hall to train peasants, Barracks for swordsmen, Archery Range for archers.</div>
    </div>
    <div id="game-over" style="display:none">
      <div id="game-over-text"></div>
      <button id="download-replay">Download replay</button>
      <button id="restart">Restart</button>
    </div>
    <div id="lobby-name-modal" style="display:none">
      <div class="lobby-modal-title">Enter your name</div>
      <input id="lobby-name-input" type="text" maxlength="24" placeholder="Your name" />
      <div id="lobby-name-error" class="lobby-modal-error"></div>
      <button id="lobby-name-submit">Join lobby</button>
    </div>
    <div id="lobby-invite-modal" style="display:none">
      <div id="lobby-invite-text" class="lobby-modal-title"></div>
      <div class="lobby-modal-actions">
        <button id="lobby-invite-accept">Accept</button>
        <button id="lobby-invite-decline">Decline</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
